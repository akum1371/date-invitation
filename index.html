
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Special Date ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Segoe UI,Arial,sans-serif;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffe4ec,#fff7fb);
display:flex;
align-items:center;
justify-content:center;
}
.card{
width:min(900px,92vw);
height:min(700px,90vh);
background:rgba(255,255,255,.95);
backdrop-filter:blur(10px);
border-radius:35px;
box-shadow:0 20px 60px rgba(255,0,100,.18);
text-align:center;
padding:40px;
position:relative;
}
.icon{font-size:70px;animation:pulse 2s infinite}
@keyframes pulse{50%{transform:scale(1.15)}}
h1{margin:18px 0;color:#ff4d6d;font-size:3.5rem}
p{font-size:2rem;color:#5d1830}
button{
position:fixed;
padding:18px 42px;
border:none;
border-radius:999px;
font-size:1.4rem;
font-weight:bold;
cursor:pointer;
transition:.25s;
}
#yesBtn{
left:34%;
top:72%;
background:#ff4d6d;
color:#fff;
box-shadow:0 0 30px rgba(255,0,90,.45);
}
#noBtn{
left:58%;
top:72%;
background:#9dc8f7;
color:#14385c;
}
#success{
display:none;
position:fixed;
inset:0;
background:linear-gradient(135deg,#fff0f5,#fff);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}
#success h1{font-size:4rem}
#success p{font-size:2rem}
.float{
position:fixed;
font-size:26px;
animation:rise linear infinite;
opacity:.7;
pointer-events:none;
}
@keyframes rise{
from{transform:translateY(110vh)}
to{transform:translateY(-20vh)}
}
.fall{

position:fixed;

top:-60px;

pointer-events:none;

z-index:9999;

animation:flowerFall linear forwards;

}

@keyframes flowerFall{

0%{

transform:
translateY(-80px)
rotate(0deg);

opacity:1;

}

100%{

transform:
translateY(120vh)
rotate(720deg);

opacity:0.9;

}

}
@keyframes fall{
to{transform:translateY(110vh) rotate(540deg)}
}
  /* ================= MOBILE ================= */

@media (max-width:768px){

.card{
    width:92%;
    height:auto;
    min-height:520px;
    padding:25px;
}

.icon{
    font-size:55px;
}

h1{
    font-size:2.4rem;
    line-height:1.2;
}

p{
    font-size:1.4rem;
    line-height:1.5;
}

button{
    position:absolute;
    font-size:1rem;
    padding:14px 26px;
}

#yesBtn{
    left:20%;
    top:78%;
}

#noBtn{
    left:58%;
    top:78%;
}

#success h1{
    font-size:2.6rem;
}

#success p{
    font-size:1.4rem;
}

}
</style>
</head>
<body>

<div id="bg"></div>

<div class="card" id="card">
<div class="icon">💌</div>
<h1>HEY DHAKKAAN 🤪</h1>
<p>Will you go out on a date with me<br><b>on August 2nd?</b> ✨</p>
</div>

<button id="yesBtn">YES! 💖</button>
<button id="noBtn">No 😅</button>

<div id="success">
<h1>YAYYY!! ❤️🥹</h1>
<p>It's a Date! I can't wait! 🌹✨</p>
</div>

<script>
const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");
const success=document.getElementById("success");
const card=document.getElementById("card");
let grow=1;

function moveNo(){

no.style.position="fixed";

const pad=20;

const x=Math.random()*(window.innerWidth-no.offsetWidth-pad);

const y=Math.random()*(window.innerHeight-no.offsetHeight-pad);

no.style.left=x+"px";

no.style.top=y+"px";

grow+=0.08;

yes.style.transform=`scale(${grow})`;

}
}

["mouseenter","mouseover","mousemove","mousedown","touchstart","click"].forEach(ev=>{
no.addEventListener(ev,e=>{
e.preventDefault();
moveNo();
});
});

yes.onclick=()=>{
card.style.display="none";
yes.style.display="none";
no.style.display="none";
success.style.display="flex";

const items=[
"🌻",
"🌹",
"🌸",
"🌺",
"🌷",
"🌼",
"🪷",
"💐",
"🌿",
"🍀",
"💖",
"💕",
"✨"
];

// Initial flower burst
for(let i=0;i<250;i++){

let f=document.createElement("div");

f.className="fall";

f.innerHTML=items[Math.floor(Math.random()*items.length)];

f.style.left=Math.random()*100+"vw";

f.style.fontSize=(20+Math.random()*35)+"px";

f.style.animationDuration=(2+Math.random()*4)+"s";

f.style.animationDelay=(Math.random()*2)+"s";

document.body.appendChild(f);

}

// Continuous flower rain
setInterval(()=>{

let flower=document.createElement("div");

flower.className="fall";

flower.innerHTML=items[Math.floor(Math.random()*items.length)];

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize=(18+Math.random()*40)+"px";

flower.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(flower);

setTimeout(()=>{

flower.remove();

},7000);

},120);
};

const bg=document.getElementById("bg");
const hearts=["💖","💕","💗","💞","✨"];
for(let i=0;i<35;i++){
let h=document.createElement("div");
h.className="float";
h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(6+Math.random()*6)+"s";
h.style.animationDelay=Math.random()*6+"s";
bg.appendChild(h);
}
</script>

</body>
</html>
